<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HiveHub Dashboard — live demo</title>
  <meta name="description" content="Interactive demo of the built-in HiveHub dashboard with sample data — weight, temperature, audio, battery and insights for your self-hosted beehive monitor. No backend required." />
  <meta name="color-scheme" content="light dark" />
  <!-- Set the theme before the stylesheet paints, so there's no light flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("hivehub-theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { /* localStorage blocked — fall back to the light default */ }
    })();
  </script>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🐝</text></svg>" />
  <style>
    /* demo-only chrome on top of the shared dashboard stylesheet */
    .demo-banner {
      background: var(--overlay-bg); color: var(--overlay-fg); text-align: center;
      font-size: .82rem; padding: .35rem .8rem;
    }
    .demo-banner a { color: var(--honey); font-weight: 700; }
    .demo-pill {
      background: var(--honey); color: #1f2421; font-weight: 800;
      font-size: .68rem; letter-spacing: .05em; padding: .1rem .45rem;
      border-radius: 999px; margin-left: .5rem;
    }
    .brand a { color: inherit; }
  </style>
</head>
<body>
  <div class="demo-banner">
    🐝 You're viewing a <strong>demo with sample data</strong> — no backend, nothing is saved.
    <a href="../index.html">← Back to HiveHub</a> ·
    <a href="https://github.com/MacNite/HiveHub">GitHub</a>
  </div>

  <header class="topbar">
    <div class="brand">
      <a href="../index.html"><span class="logo">🐝</span></a>
      <span>HiveHub</span>
      <span class="brand-sub">Dashboard</span>
      <span class="demo-pill">DEMO</span>
    </div>

    <div class="topbar-controls">
      <!-- Cross-device hive picker: one menu grouped by device replaces the old
           Device + Hive dropdowns, so hives from different devices can be
           compared side by side. Populated by app.js. -->
      <div class="field hive-picker" id="hive-picker">
        <span class="field-label">Hives</span>
        <button class="hive-trigger" id="hive-trigger" type="button"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="hive-pop">
          <span class="hive-trigger-label" id="hive-trigger-label">Select hives</span>
          <span class="hive-count" id="hive-count" hidden>0</span>
          <span class="hive-caret" aria-hidden="true">▾</span>
        </button>
        <div class="hive-pop" id="hive-pop" role="dialog" aria-label="Select hives to compare" hidden>
          <input class="hive-search" id="hive-search" type="text"
                 placeholder="Filter hives or devices…" aria-label="Filter hives" />
          <div class="hive-pop-list" id="hive-pop-list"><!-- groups injected by app.js --></div>
          <div class="hive-pop-foot">
            <button class="link-btn" id="hive-clear" type="button">Clear</button>
            <span class="hive-pop-hint" id="hive-pop-hint"></span>
            <button class="btn small" id="hive-done" type="button">Done</button>
          </div>
        </div>
      </div>

      <!-- Only shown when the selection spans more than one device: scopes the
           device-level panels (Connectivity, collector battery, Insights,
           Device & admin, ambient readings) to a single device. -->
      <label class="field" id="active-device-field" hidden>
        <span class="field-label">Device details</span>
        <select id="active-device-select" aria-label="Device for device-level panels"></select>
      </label>

      <div class="field" id="range-field">
        <span class="field-label">Range</span>
        <div class="range-group" id="range-group" role="group" aria-label="Time range">
          <button data-range="1d" type="button" aria-pressed="false">Day</button>
          <button data-range="7d" type="button" class="active" aria-pressed="true">7 days</button>
          <button data-range="30d" type="button" aria-pressed="false">Month</button>
          <button data-range="365d" type="button" aria-pressed="false">Year</button>
          <button data-range="1825d" type="button" aria-pressed="false">5 years</button>
        </div>
      </div>

      <button id="refresh-btn" class="btn small" type="button" title="Refresh">↻ Refresh</button>

      <button data-theme-toggle class="btn small ghost theme-toggle" type="button" aria-label="Toggle dark mode"></button>
    </div>
  </header>

  <!-- ── Selection strip: the current comparison set, always visible ── -->
  <div class="selection-strip" id="selection-strip" hidden></div>

  <div class="layout">
    <nav class="sidebar" id="sidebar" aria-label="Data groups"></nav>
    <main class="content" id="content">
      <div class="empty-state">Loading…</div>
    </main>
  </div>

  <div id="device-status" class="device-status" role="status" aria-live="polite" hidden></div>

  <script src="assets/theme.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
