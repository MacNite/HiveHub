; PlatformIO compiles every .cpp under src/ automatically, so the split needs
; no manual file list. include/ is on the global header search path.
;
; This firmware targets Arduino-ESP32 3.x (ESP-IDF 5.x). The mic capture path
; uses the new channel-based I2S "standard" driver (driver/i2s_std.h); it will
; NOT build against the old Arduino-ESP32 2.x legacy I2S driver.
;
; Pinned to a known-good stable pioarduino release (55.03.39 = Arduino-ESP32
; 3.3.9 / ESP-IDF 5.5.4). Without a pin, `espressif32` resolves to a
; development snapshot (60.x+develop) whose WiFi headers are broken.
; The version string "55.03.39" contains leading zeros that PlatformIO's
; semver parser rejects, so we reference the release zip directly instead.
[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
; Name the compiled artifacts after FIRMWARE_VERSION (src/globals.cpp),
; e.g. hivescale_0.9.2.bin instead of firmware.bin.
extra_scripts = pre:rename_firmware.py
build_flags =
    -std=gnu++17
    -Os
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    bogde/HX711
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    adafruit/Adafruit SHT4x Library
    adafruit/RTClib
    bblanchon/ArduinoJson
; Required by the INMP441 mic FFT (ENABLE_INMP441_MICS). Header-only, so it
; costs nothing when the mic feature is disabled.
    kosme/arduinoFFT@^2.0.4
; HolyIot 25015 in-hive BLE sensor bridge (ENABLE_BLE_SCAN). NimBLE is far
; smaller than the bluedroid stack; it is only compiled in when ble_sensor.cpp
; references it, i.e. when the feature flag is set in secrets.h.
; MUST be the 2.x series: NimBLE-Arduino 1.4.x targets Arduino-ESP32 2.x /
; ESP-IDF 4.4 and its controller init path is incompatible with the pinned
; Arduino-ESP32 3.3.x / ESP-IDF 5.5 toolchain above — on IDF5 the very first
; NimBLEDevice::init() aborts in esp_bt_controller_init() with
; ESP_ERR_INVALID_STATE (controller not IDLE). 2.x is the IDF5-compatible line.
    h2zero/NimBLE-Arduino@^2.2.3
; Optional features — uncomment only if the matching flag is set in secrets.h:
    adafruit/Adafruit INA219                                  ; ENABLE_INA219_SOLAR
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library     ; ENABLE_MAX17048_BATTERY

; ── XIAO ESP32-C6 variant ────────────────────────────────────────────────────
; Compact RISC-V module using only the 11 front-header pins (D0–D10).
; Wired in-hive sensors (DS18B20, INMP441) are NOT supported on this variant;
; use wireless BLE in-hive sensors (HolyIot 25015, RuuviTag, HiveInside).
; The deep-sleep button-wake API differs from the classic ESP32 — see
; storage_power.cpp for the CONFIG_IDF_TARGET_ESP32C6 guard blocks.
[env:xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts = pre:rename_firmware.py
build_flags =
    -std=gnu++17
    -Os
    -DCORE_DEBUG_LEVEL=1
; Explicit board identity flag used by config.h to force-off wired sensors and
; select the C6 pin map. CONFIG_IDF_TARGET_ESP32C6 is only reachable via
; sdkconfig.h (pulled in by Arduino.h), but config.h is included before
; Arduino.h, so the toolchain macro is not yet defined at that point.
; HIVESCALE_BOARD_XIAO_C6 is a plain -D flag, available from the very first
; preprocessor line, guaranteeing the guards fire regardless of include order.
    -DHIVESCALE_BOARD_XIAO_C6=1
; Wired in-hive sensors (DS18B20, INMP441) are force-disabled for this target
; inside config.h — their libraries are intentionally omitted from lib_deps.
lib_deps =
    bogde/HX711
    adafruit/Adafruit SHT4x Library
    adafruit/RTClib
    bblanchon/ArduinoJson
    h2zero/NimBLE-Arduino@^2.2.3
    adafruit/Adafruit INA219
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library