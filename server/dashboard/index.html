<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>HiveHub Dashboard</title>
  <!-- Set the theme before the stylesheet paints, so there's no light flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("hivehub-theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { /* localStorage blocked — fall back to the light default */ }
    })();
  </script>
  <link rel="stylesheet" href="assets/style.css" />
  <!-- Preload the whole ES-module graph. Without these the browser discovers
       app.js's imports only after fetching app.js (and charts.js only after
       views.js), serialising three network round-trips before init() runs. -->
  <link rel="modulepreload" href="assets/app.js" />
  <link rel="modulepreload" href="assets/api.js" />
  <link rel="modulepreload" href="assets/auth.js" />
  <link rel="modulepreload" href="assets/format.js" />
  <link rel="modulepreload" href="assets/views.js" />
  <link rel="modulepreload" href="assets/charts.js" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🐝</text></svg>" />
</head>
<body>
  <!-- ── Top bar: brand, device dropdown, hive selector, time range, refresh ── -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">🐝</span>
      <span>HiveHub</span>
      <span class="brand-sub">Dashboard</span>
    </div>

    <div class="topbar-controls">
      <label class="field">
        <span class="field-label">Device</span>
        <select id="device-select" aria-label="Select device"></select>
      </label>

      <label class="field">
        <span class="field-label">Hive</span>
        <select id="hive-select" aria-label="Select hive">
          <!-- populated by app.js from the device's reported hives (up to 18) -->
          <option value="all">All hives</option>
        </select>
      </label>

      <div class="field" id="range-field">
        <span class="field-label">Range</span>
        <div class="range-group" id="range-group" role="group" aria-label="Time range">
          <button data-range="1d" type="button" aria-pressed="false">Day</button>
          <button data-range="7d" type="button" class="active" aria-pressed="true">7 days</button>
          <button data-range="30d" type="button" aria-pressed="false">Month</button>
          <button data-range="365d" type="button" aria-pressed="false">Year</button>
          <button data-range="1825d" type="button" aria-pressed="false">5 years</button>
        </div>
      </div>

      <button id="refresh-btn" class="btn small" type="button" title="Refresh">
        ↻ Refresh
      </button>

      <button data-theme-toggle class="btn small ghost theme-toggle" type="button" aria-label="Toggle dark mode"></button>

      <div class="user-area" id="user-area" hidden>
        <span class="user-chip" id="user-chip"></span>
        <button id="logout-btn" class="btn small ghost" type="button" title="Sign out">Sign out</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- ── Sidebar: one entry per data group (rigid, beehivemonitoring-style) ── -->
    <nav class="sidebar" id="sidebar" aria-label="Data groups">
      <!-- populated by app.js -->
    </nav>

    <!-- ── Main content: the active group's view renders here ── -->
    <main class="content" id="content">
      <div class="empty-state">Loading…</div>
    </main>
  </div>

  <div id="device-status" class="device-status" role="status" aria-live="polite" hidden></div>

  <script src="assets/theme.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
